# Railway: Settings → Config-as-code → path `apps/abandoned-cart/railway.toml`.
#
# With this config-as-code path, Railpack roots the *runner* image at this app
# folder — `/app` in the container is the app itself (no workspace root, no root
# `package.json`). So the start command must be the app's OWN start script, run
# from the app dir. `pnpm start` here resolves to
# `next start -H 0.0.0.0 -p ${PORT:-3000}` (this app's package.json), NOT the
# monorepo's `turbo run start`.
[deploy]
startCommand = "pnpm start"
