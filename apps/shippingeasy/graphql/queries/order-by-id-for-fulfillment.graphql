query OrderByIdForFulfillment($id: ID!) {
  order(id: $id) {
    id
    number
    status
    lines {
      id
      quantity
      quantityFulfilled
      variant {
        id
        stocks {
          warehouse {
            id
          }
        }
      }
    }
    privateMetadata {
      key
      value
    }
  }
}
