fragment OrderLineForShippingEasy on OrderLine {
  id
  productName
  variantName
  productSku
  quantity
  quantityFulfilled
  totalPrice {
    gross {
      amount
      currency
    }
  }
  unitPrice {
    gross {
      amount
      currency
    }
  }
  variant {
    id
    sku
    weight {
      value
      unit
    }
  }
}

fragment OrderForShippingEasy on Order {
  id
  number
  created
  status
  userEmail
  channel {
    id
    slug
    currencyCode
  }
  total {
    gross {
      amount
      currency
    }
  }
  shippingPrice {
    gross {
      amount
    }
  }
  shippingAddress {
    ...AddressFragment
  }
  billingAddress {
    ...AddressFragment
  }
  lines {
    ...OrderLineForShippingEasy
  }
  fulfillments {
    id
    status
    trackingNumber
  }
}

subscription OrderCreated {
  event {
    ... on OrderCreated {
      order {
        ...OrderForShippingEasy
      }
    }
  }
}
