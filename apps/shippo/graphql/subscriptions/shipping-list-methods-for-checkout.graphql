fragment ShippingListMethodsCheckoutLines on CheckoutLine {
  id
  quantity
  variant {
    id
    sku
    name
    weight {
      value
      unit
    }
    product {
      id
      name
      weight {
        value
        unit
      }
      category {
        id
        slug
        name
      }
    }
  }
}

fragment ShippingListMethodsCheckout on Checkout {
  id
  channel {
    id
    slug
  }
  shippingAddress {
    ...AddressFragment
  }
  billingAddress {
    ...AddressFragment
  }
  lines {
    ...ShippingListMethodsCheckoutLines
  }
}

subscription ShippingListMethodsForCheckout {
  event {
    ... on ShippingListMethodsForCheckout {
      checkout {
        ...ShippingListMethodsCheckout
      }
    }
  }
}
